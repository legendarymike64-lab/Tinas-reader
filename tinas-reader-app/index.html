<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#e07b3f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tina's Reader">
<title>Tina's Reader</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ee;
    --surface: #fff8f0;
    --card: #ffffff;
    --accent: #e07b3f;
    --accent2: #4a90c4;
    --text: #2c2012;
    --muted: #9a8878;
    --border: #e8d8c8;
    --success: #5aab6e;
    --radius: 20px;
    --shadow: 0 4px 24px rgba(100,60,20,0.10);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(224,123,63,0.35);
  }
  .topbar-icon { font-size: 1.5rem; }
  .topbar-title { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.3px; }

  /* ── Scrollable body ── */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 14px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    padding: 18px;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    padding: 4px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    margin-bottom: 14px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 10px;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(224,123,63,0.3); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Drop/camera zone ── */
  .drop-zone {
    border: 2.5px dashed var(--border);
    border-radius: 16px;
    padding: 30px 16px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    position: relative;
    transition: all 0.2s;
  }
  .drop-zone:active { background: rgba(224,123,63,0.07); border-color: var(--accent); }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 2.4rem; margin-bottom: 6px; display: block; }
  .drop-label { font-size: 1rem; font-weight: 700; }
  .drop-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

  .camera-row {
    display: flex; gap: 10px; margin-top: 12px;
  }
  .cam-btn {
    flex: 1;
    padding: 13px 0;
    border: 1.5px solid var(--border);
    border-radius: 13px;
    background: var(--surface);
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text);
    transition: all 0.18s;
  }
  .cam-btn:active { background: var(--border); }
  .cam-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cam-btn.primary:active { opacity: 0.85; }

  #preview-wrap {
    margin-top: 12px;
    display: none;
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    position: relative;
  }
  #preview-wrap img { width: 100%; max-height: 220px; object-fit: contain; display: block; background: #f5ede4; }
  .remove-img {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.55); color: #fff;
    border: none; border-radius: 50%;
    width: 30px; height: 30px; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* ── Textarea ── */
  textarea {
    width: 100%; min-height: 110px;
    border: 1.5px solid var(--border); border-radius: 14px;
    padding: 12px 14px;
    font-family: 'Nunito', sans-serif; font-size: 1rem;
    color: var(--text); background: var(--surface);
    resize: vertical; outline: none;
  }
  textarea:focus { border-color: var(--accent2); }

  /* ── URL ── */
  .url-row { display: flex; gap: 8px; margin-top: 10px; }
  .url-row input {
    flex: 1; padding: 11px 13px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 0.92rem;
    background: var(--surface); color: var(--text); outline: none;
  }
  .url-btn {
    padding: 11px 16px; background: var(--accent2); color: #fff;
    border: none; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }

  /* ── Voice row ── */
  .voice-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  select {
    flex: 1; min-width: 0;
    padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 0.88rem;
    background: var(--surface); color: var(--text); outline: none;
  }
  .speed-wrap {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 9px 12px;
  }
  .speed-wrap span { font-size: 1rem; }
  input[type=range] {
    -webkit-appearance: none; width: 70px; height: 4px;
    border-radius: 2px; background: var(--border); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }

  /* ── BIG read button ── */
  .read-btn {
    width: 100%; padding: 20px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 18px;
    font-family: 'Nunito', sans-serif; font-size: 1.25rem; font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(224,123,63,0.4);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .read-btn:active:not(:disabled) { transform: scale(0.97); opacity: 0.9; }
  .read-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Status ── */
  #status {
    text-align: center; font-size: 0.9rem; font-weight: 700;
    color: var(--muted); min-height: 28px; padding: 4px;
  }
  #status.loading { color: var(--accent); }
  #status.error   { color: #c0392b; }
  #status.success { color: var(--success); }

  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2.5px solid rgba(224,123,63,0.3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Output ── */
  #output-card { display: none; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .output-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .copy-btn {
    padding: 5px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; color: var(--muted);
  }

  #output-text {
    font-family: 'Lora', serif; font-size: 1rem; line-height: 1.8;
    color: var(--text); background: var(--surface);
    border-radius: 14px; padding: 14px 16px;
    border: 1.5px solid var(--border);
    max-height: 200px; overflow-y: auto; white-space: pre-wrap;
  }

  /* ── Playback ── */
  .playback-bar {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px; background: var(--surface);
    border-radius: 14px; padding: 12px 14px;
    border: 1.5px solid var(--border);
  }
  .pb-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 50%; width: 44px; height: 44px;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(224,123,63,0.3);
  }
  .pb-btn.secondary { background: var(--accent2); }
  .pb-btn:active { opacity: 0.8; transform: scale(0.95); }
  .pb-label { font-size: 0.88rem; color: var(--muted); font-weight: 600; }

  .speaking-ring { display: none; align-items: center; justify-content: center; gap: 5px; margin-top: 6px; }
  .speaking-ring.active { display: flex; }
  .ring-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.1s ease-in-out infinite;
  }
  .ring-dot:nth-child(2) { animation-delay: 0.18s; }
  .ring-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes pulse {
    0%,100% { transform: scale(0.7); opacity: 0.5; }
    50%      { transform: scale(1.3); opacity: 1; }
  }

  /* ── Install banner ── */
  #install-banner {
    display: none;
    background: var(--accent2);
    color: #fff;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 700;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(74,144,196,0.3);
  }
  #install-banner.show { display: flex; }
  .install-btn {
    background: #fff; color: var(--accent2);
    border: none; border-radius: 10px;
    padding: 8px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.88rem;
    cursor: pointer; white-space: nowrap;
  }
  .dismiss-btn {
    background: transparent; color: rgba(255,255,255,0.75);
    border: none; font-size: 1.1rem; cursor: pointer; padding: 2px 6px;
  }

  footer {
    text-align: center; color: var(--muted);
    font-size: 0.75rem; padding-bottom: 6px;
    font-family: 'Lora', serif; font-style: italic;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-icon">👁️‍🗨️</span>
  <span class="topbar-title">Tina's Reader</span>
</div>

<!-- Install banner -->
<div id="install-banner">
  <span>📲 Add to home screen for quick access!</span>
  <button class="install-btn" onclick="installPWA()">Install</button>
  <button class="dismiss-btn" onclick="dismissBanner()">✕</button>
</div>

<div class="scroll-body">

  <!-- Input card -->
  <div class="card">
    <div class="card-title">What should I read?</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('photo')">📷 Photo</button>
      <button class="tab" onclick="switchTab('text')">✏️ Text</button>
      <button class="tab" onclick="switchTab('url')">🔗 URL</button>
    </div>

    <!-- Photo -->
    <div class="tab-panel active" id="tab-photo">
      <div class="camera-row">
        <button class="cam-btn primary" onclick="openCamera()">📷 Use Camera</button>
        <button class="cam-btn" onclick="openGallery()">🖼️ Gallery</button>
      </div>
      <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="gallery-input" accept="image/*" style="display:none">
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="Preview">
        <button class="remove-img" onclick="clearImage()">✕</button>
      </div>
      <div id="no-image-hint" style="text-align:center;color:var(--muted);font-size:0.85rem;margin-top:14px;">
        Take a photo of anything — a sign, menu, document, or handwriting!
      </div>
    </div>

    <!-- Text -->
    <div class="tab-panel" id="tab-text">
      <textarea id="text-input" placeholder="Paste or type any text here and Tina's Reader will read it aloud…"></textarea>
    </div>

    <!-- URL -->
    <div class="tab-panel" id="tab-url">
      <p style="font-size:0.88rem;color:var(--muted);margin-bottom:8px;">Enter a webpage link to read the article aloud.</p>
      <div class="url-row">
        <input type="url" id="url-input" placeholder="https://example.com/article">
        <button class="url-btn" onclick="fetchURL()">Fetch</button>
      </div>
    </div>
  </div>

  <!-- Voice settings -->
  <div class="card">
    <div class="card-title">Voice & Speed</div>
    <div class="voice-row">
      <select id="voice-select"><option>Default voice</option></select>
      <div class="speed-wrap">
        <span>🐢</span>
        <input type="range" id="rate-slider" min="0.5" max="2" step="0.05" value="0.85">
        <span>🐇</span>
      </div>
    </div>
  </div>

  <!-- Read button -->
  <button class="read-btn" id="read-btn" onclick="handleRead()">
    <span>🔊</span> Read It To Me
  </button>

  <div id="status"></div>

  <!-- Output -->
  <div class="card" id="output-card">
    <div class="output-header">
      <span class="output-title">Text detected</span>
      <button class="copy-btn" onclick="copyText()">Copy</button>
    </div>
    <div id="output-text"></div>
    <div class="playback-bar">
      <button class="pb-btn" id="play-pause-btn" onclick="togglePlayPause()">▶</button>
      <button class="pb-btn secondary" onclick="stopSpeech()">⏹</button>
      <span class="pb-label" id="pb-label">Ready to play</span>
    </div>
    <div class="speaking-ring" id="speaking-ring">
      <div class="ring-dot"></div><div class="ring-dot"></div><div class="ring-dot"></div>
      <span style="font-size:0.8rem;color:var(--accent);font-weight:700;">Reading aloud…</span>
    </div>
  </div>

  <footer>Made with ❤️ for Tina</footer>
</div>

<script>
// ── PWA install ───────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
}
function dismissBanner() {
  document.getElementById('install-banner').classList.remove('show');
}

// ── Service worker ────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}

// ── State ─────────────────────────────────────────
let currentTab = 'photo';
let imageBase64 = null;
let imageMediaType = 'image/jpeg';
let extractedText = '';
let utterance = null;
let isPaused = false;
let voicesList = [];

// ── Tabs ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((b,i) =>
    b.classList.toggle('active', ['photo','text','url'][i] === tab));
  document.querySelectorAll('.tab-panel').forEach((p,i) =>
    p.classList.toggle('active', ['photo','text','url'][i] === tab));
}

// ── Camera / gallery ──────────────────────────────
function openCamera()  { document.getElementById('camera-input').click(); }
function openGallery() { document.getElementById('gallery-input').click(); }

['camera-input','gallery-input'].forEach(id => {
  document.getElementById(id).addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadImage(file);
    e.target.value = '';
  });
});

function loadImage(file) {
  imageMediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('no-image-hint').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  imageBase64 = null;
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('no-image-hint').style.display = 'block';
}

// ── URL fetch ─────────────────────────────────────
async function fetchURL() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return setStatus('Please enter a URL.', 'error');
  setStatus('<span class="spinner"></span>Fetching page…', 'loading');
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, 'text/html');
    ['script','style','nav','footer','aside','header'].forEach(t => doc.querySelectorAll(t).forEach(el => el.remove()));
    const text = (doc.querySelector('article') || doc.querySelector('main') || doc.body)
      .innerText.replace(/\s+/g,' ').trim();
    document.getElementById('text-input').value = text.slice(0, 4000);
    switchTab('text');
    setStatus('✅ Page loaded — press Read to hear it!', 'success');
  } catch {
    setStatus('Could not fetch that URL. Try pasting the text instead.', 'error');
  }
}

// ── Voices ────────────────────────────────────────
function populateVoices() {
  voicesList = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  if (!voicesList.length) { sel.innerHTML = '<option>Default voice</option>'; return; }
  voicesList.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name}`;
    if (v.name.toLowerCase().includes('samantha') ||
        v.name.toLowerCase().includes('karen') ||
        v.name.toLowerCase().includes('female') ||
        v.name.toLowerCase().includes('google uk english female')) opt.selected = true;
    sel.appendChild(opt);
  });
}
speechSynthesis.onvoiceschanged = populateVoices;
populateVoices();

// ── Main handler ──────────────────────────────────
async function handleRead() {
  stopSpeech();
  hideOutput();
  if (currentTab === 'photo') {
    if (!imageBase64) { setStatus('Please take or choose a photo first.', 'error'); return; }
    await readImage();
  } else {
    const t = document.getElementById('text-input').value.trim();
    if (!t) { setStatus('Please enter some text first.', 'error'); return; }
    extractedText = t;
    showAndSpeak(extractedText);
  }
}

// ── AI image reading ──────────────────────────────
async function readImage() {
  setStatus('<span class="spinner"></span>Reading with AI…', 'loading');
  document.getElementById('read-btn').disabled = true;
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: imageMediaType, data: imageBase64 } },
            { type: "text", text: "Please read all the text visible in this image clearly and naturally, as if reading it aloud to someone. Include ALL text — signs, labels, menus, handwriting, documents, anything. Read sections in a logical order. Only provide the text to be read, no extra commentary." }
          ]
        }]
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    extractedText = data.content.map(b => b.text || '').join('').trim();
    if (!extractedText) throw new Error("No text found in image.");
    showAndSpeak(extractedText);
  } catch(e) {
    setStatus('⚠️ ' + (e.message || 'Something went wrong. Please try again.'), 'error');
    document.getElementById('read-btn').disabled = false;
  }
}

// ── Show + speak ──────────────────────────────────
function showAndSpeak(text) {
  document.getElementById('output-text').textContent = text;
  document.getElementById('output-card').style.display = 'block';
  setStatus('');
  document.getElementById('read-btn').disabled = false;
  speak(text);
}
function hideOutput() {
  document.getElementById('output-card').style.display = 'none';
}

// ── Speech ────────────────────────────────────────
function speak(text) {
  stopSpeech();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = parseFloat(document.getElementById('rate-slider').value);
  const selIdx = document.getElementById('voice-select').value;
  if (voicesList.length && selIdx !== '') utterance.voice = voicesList[selIdx];
  utterance.onstart = () => {
    document.getElementById('play-pause-btn').textContent = '⏸';
    document.getElementById('pb-label').textContent = 'Reading aloud…';
    document.getElementById('speaking-ring').classList.add('active');
    isPaused = false;
  };
  utterance.onend = utterance.onerror = () => {
    document.getElementById('play-pause-btn').textContent = '▶';
    document.getElementById('pb-label').textContent = 'Finished';
    document.getElementById('speaking-ring').classList.remove('active');
    isPaused = false;
  };
  speechSynthesis.speak(utterance);
}

function togglePlayPause() {
  if (!utterance && extractedText) { speak(extractedText); return; }
  if (speechSynthesis.speaking && !isPaused) {
    speechSynthesis.pause(); isPaused = true;
    document.getElementById('play-pause-btn').textContent = '▶';
    document.getElementById('pb-label').textContent = 'Paused';
    document.getElementById('speaking-ring').classList.remove('active');
  } else if (isPaused) {
    speechSynthesis.resume(); isPaused = false;
    document.getElementById('play-pause-btn').textContent = '⏸';
    document.getElementById('pb-label').textContent = 'Reading aloud…';
    document.getElementById('speaking-ring').classList.add('active');
  } else if (extractedText) {
    speak(extractedText);
  }
}

function stopSpeech() {
  speechSynthesis.cancel(); isPaused = false; utterance = null;
  document.getElementById('play-pause-btn').textContent = '▶';
  document.getElementById('pb-label').textContent = 'Stopped';
  document.getElementById('speaking-ring').classList.remove('active');
}

// ── Helpers ───────────────────────────────────────
function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.innerHTML = msg; el.className = type;
}
function copyText() {
  navigator.clipboard.writeText(extractedText).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}
</script>
